<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: linear-gradient(135deg, #111 0%, #222 100%); width: 280px; padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,1); }
        .active { color: #00ff88; border: 1px solid #00ff88; padding: 5px 10px; border-radius: 50px; font-size: 12px; }
        .qr-box { background: white; width: 160px; height: 160px; margin: 20px auto; border-radius: 10px; padding: 10px; }
        #debug { font-size: 10px; color: #444; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="app" class="card">
        <div id="status">Verificando...</div>
        <div class="qr-box">
            <img id="qr" src="" style="width:100%">
        </div>
        <h2 id="name">Cargando...</h2>
        <p id="dni">DNI: ---</p>
        <div id="debug">Iniciando sistema...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const debug = (msg) => { document.getElementById('debug').innerText = msg; };

        async function init() {
            try {
                const SUPABASE_URL = 'https://tglwpwnxozfgnyrluvdm.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbHdwd254b3pmZ255cmx1dmRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjA5NTUsImV4cCI6MjA4Nzc5Njk1NX0.EjjlvYZaFZ2nBd4zF7TcL0zFz56SV8MLdqt3GchbnTA';
                
                debug("Conectando a Supabase...");
                const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

                const user = tg.initDataUnsafe.user;
                if (!user) {
                    debug("Error: Ábrelo desde Telegram");
                    return;
                }

                debug("Buscando usuario: " + user.id);
                const { data, error } = await _supabase
                    .from('socios')
                    .select('*')
                    .eq('telegram_id', user.id)
                    .single();

                if (error || !data) {
                    debug("No registrado en DB");
                    document.getElementById('name').innerText = user.first_name;
                    document.getElementById('status').innerText = "SIN REGISTRO";
                } else {
                    debug("¡Socio encontrado!");
                    document.getElementById('name').innerText = data.full_name;
                    document.getElementById('dni').innerText = "DNI: " + data.dni;
                    document.getElementById('status').innerText = "SOCIO ACTIVO";
                    document.getElementById('status').className = "active";
                    document.getElementById('qr').src = `https://quickchart.io/qr?text=${data.dni}&size=200`;
                }
            } catch (e) {
                debug("Error crítico: " + e.message);
            }
        }

        init();
    </script>
</body>
</html>
