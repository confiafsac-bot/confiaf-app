<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%); width: 300px; padding: 25px; border-radius: 25px; border: 1px solid #333; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.7); position: relative; }
        .status-badge { padding: 5px 15px; border-radius: 50px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: inline-block; }
        .active { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }
        .pending { background: #ffcc0022; color: #ffcc00; border: 1px solid #ffcc00; }
        .qr-container { background: white; width: 180px; height: 180px; margin: 20px auto; border-radius: 15px; padding: 10px; display: flex; align-items: center; justify-content: center; }
        .qr-container img { width: 100%; height: auto; }
        h2 { margin: 10px 0 5px 0; font-size: 22px; font-weight: 600; }
        p { color: #888; font-size: 14px; margin: 0; }
        .footer-logo { margin-top: 20px; opacity: 0.4; font-size: 12px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="app" class="card" style="display:none;">
        <div id="status" class="status-badge">Verificando...</div>
        <div class="qr-container">
            <img id="qr" src="" alt="Código QR">
        </div>
        <h2 id="name">Cargando...</h2>
        <p id="dni">DNI: ---</p>
        <div class="footer-logo">CONFIAF PASS</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // CONFIGURACIÓN DE SUPABASE
                const SUPABASE_URL = 'https://tglwpwnxozfgnyrluvdm.supabase.co';
                const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbHdwd254b3pmZ255cmx1dmRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjA5NTUsImV4cCI6MjA4Nzc5Njk1NX0.EjjlvYZaFZ2nBd4zF7TcL0zFz56SV8MLdqt3GchbnTA'; // (Tu key completa)
                
                // USAR ESTA LÍNEA EXACTA:
                const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                async function loadSocio() {
                    const user = tg.initDataUnsafe.user;
                    // ... el resto del código usando _supabase.from('socios')...
                }
            // Buscamos al socio por su telegram_id en tu "monstruo" de tabla
            const { data, error } = await supabase
                .from('socios')
                .select('*')

            if (error || !data) {
                document.getElementById('name').innerText = "Usuario no registrado";
                document.getElementById('status').innerText = "NO ENCONTRADO";
                document.getElementById('status').className = "status-badge pending";
            } else {
                document.getElementById('name').innerText = data.full_name;
                document.getElementById('dni').innerText = "DNI: " + data.dni;
                document.getElementById('status').innerText = data.status === 'active' ? "SOCIO ACTIVO" : "PENDIENTE DE PAGO";
                document.getElementById('status').className = "status-badge " + (data.status === 'active' ? "active" : "pending");
                
                // Generamos el QR dinámico usando una API gratuita (QuickChart)
                // El QR contiene el DNI para que el negocio lo escanee
                document.getElementById('qr').src = `https://quickchart.io/qr?text=${data.dni}&size=200&margin=1`;
            }
            document.getElementById('app').style.display = 'block';
        }

        loadSocio();
    </script>
</body>
</html>
