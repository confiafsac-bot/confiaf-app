<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Confiaf Pass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #00ff88; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Navbar Inferior */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(26, 26, 26, 0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; backdrop-filter: blur(10px); z-index: 100; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Contenedores de Secciones */
        .section { display: none; padding: 20px; animation: slideUp 0.3s ease; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Diseño del Carné (Glassmorphism) */
        .card { background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%); border-radius: 20px; padding: 25px; border: 1px solid #333; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(0,255,136,0.05) 0%, transparent 70%); }
        .status-badge { display: inline-block; padding: 6px 12px; border-radius: 50px; font-weight: bold; font-size: 12px; margin-bottom: 15px; }
        .active-bg { background: rgba(0, 255, 136, 0.15); color: var(--primary); border: 1px solid var(--primary); }

        /* QR Container */
        .qr-area { background: white; padding: 15px; border-radius: 15px; display: inline-block; margin-top: 20px; }
        .qr-label { margin-top: 10px; font-size: 14px; color: #888; font-weight: bold; }

        /* Botón de Acción */
        .btn-share { background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 15px; font-size: 16px; }
        
        h1 { font-size: 24px; margin: 0; }
        p { color: #bbb; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="pese" class="section active">
        <div class="card">
            <div id="user-status" class="status-badge active-bg">SOCIO ACTIVO</div>
            <h1 id="user-name">Cargando...</h1>
            <p id="user-dni">DNI: ---</p>
            
            <center>
                <div class="qr-area">
                    <div id="qr-benefits"></div>
                </div>
                <div class="qr-label">ESCANEAME EN EL LOCAL</div>
            </center>
        </div>
    </div>

    <div id="ganar" class="section">
        <div class="card" style="border-color: #ffd700;">
            <div class="status-badge" style="background: rgba(255, 215, 0, 0.1); color: #ffd700; border: 1px solid #ffd700;">OFICINA PROMOTOR</div>
            <h2>¡Gana Recomendando!</h2>
            <p>Comparte tu enlace y gana comisiones por cada nuevo socio.</p>
            
            <center>
                <div class="qr-area">
                    <div id="qr-invitation"></div>
                </div>
                <div class="qr-label">TU QR DE INVITACIÓN</div>
            </center>

            <button class="btn-share" onclick="copyLink()">Copiar Enlace de Invitado</button>
        </div>
    </div>

    <div id="beneficios" class="section">
        <h2>Beneficios VIP</h2>
        <p>Próximamente: Lista de locales aliados cerca de ti.</p>
        </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="showTab('pese', this)"><span>🪪</span>Pase</div>
        <div class="nav-item" onclick="showTab('beneficios', this)"><span>🎁</span>Beneficios</div>
        <div class="nav-item" onclick="showTab('ganar', this)"><span>💰</span>Ganar</div>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SUPABASE_URL = 'https://tglwpwnxozfgnyrluvdm.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRnbHdwd254b3pmZ255cmx1dmRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjA5NTUsImV4cCI6MjA4Nzc5Njk1NX0.EjjlvYZaFZ2nBd4zF7TcL0zFz56SV8MLdqt3GchbnTA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        async function init() {
            const user = tg.initDataUnsafe.user;
            if (!user) return;

            const { data, error } = await _supabase
                .from('socios')
                .select('*')
                .eq('telegram_id', user.id)
                .single();

            if (data) {
                currentUser = data;
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-dni').innerText = "DNI: " + data.dni;
                
                // Generar QR Beneficios (DNI)
                new QRCode(document.getElementById("qr-benefits"), { text: data.dni, width: 160, height: 160 });
                
                // Generar QR Invitación (Enlace Bot con DNI)
                const inviteLink = `https://t.me/TU_BOT_USERNAME?start=${data.dni}`;
                new QRCode(document.getElementById("qr-invitation"), { text: inviteLink, width: 160, height: 160 });
            }
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function copyLink() {
            const link = `https://t.me/TU_BOT_USERNAME?start=${currentUser.dni}`;
            navigator.clipboard.writeText(link);
            tg.showAlert("¡Enlace copiado! Envíalo a tus invitados.");
        }

        init();
    </script>
</body>
</html>
